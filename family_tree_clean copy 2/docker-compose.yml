services:
  family-tree-db:
    image: neo4j:5.13
    container_name: family-tree-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - common_network
    restart: unless-stopped

  family-tree-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-tree-api
    ports:
      - "3001:8080"   # bi-dashboards binds 3000 in compose; pick a different host port
    networks:
      - common_network
    environment:
      PORT: 8080
      BUILD_VERSION: 0.1.0
      PATCH_VERSION: 2026.05.12.01
      ALLOW_ORIGINS: "*"
      RATE_LIMIT: 50
      LOG_DIR: /app/logs

      NEO4J_URI: bolt://family-tree-neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      NEO4J_DB: ${NEO4J_DB:-neo4j}

      KEYCLOAK_URL: ${KEYCLOAK_URL:?KEYCLOAK_URL is required}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-icp}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-icp-frontend}
      # Set to "true" once Keycloak JWKS is reachable from this container's
      # network. Off for parity with bi-dashboards' trust-the-gateway default.
      KEYCLOAK_VERIFY_SIGNATURE: "false"

    depends_on:
      family-tree-db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  common_network:
    external: true
